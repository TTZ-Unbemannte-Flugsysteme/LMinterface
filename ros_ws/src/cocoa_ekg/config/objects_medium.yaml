# ============================================
# Semantic Relationships for LLM Reasoning
# ============================================
# These relationships are exposed to the Intent Extractor LLM
# to enable disambiguation (e.g., "pallet near shelf A" → pallet_1)

relationships:
  # Spatial proximity relationships
  - from: pallet_1
    to: shelf_a
    relation: near
    
  - from: pallet_2
    to: shelf_b
    relation: near
    
  # Zone relationships
  - from: landing_pad
    to: warehouse_floor
    relation: in_zone
    
  # Obstacle proximity (helps LLM understand environment layout)
  - from: forklift
    to: pallet_2
    relation: near
    
  - from: box_1
    to: pallet_1
    relation: near
  - from: misc_box_3
    to: warehouse_wall
    relation: near

  - from: misc_box_5
    to: warehouse_wall
    relation: near

  - from: misc_box_10
    to: warehouse_wall
    relation: near

  - from: misc_box_19
    to: warehouse_wall
    relation: near

  - from: misc_box_20
    to: warehouse_wall
    relation: near

  - from: misc_box_25
    to: warehouse_wall
    relation: near

  - from: misc_box_26
    to: warehouse_wall
    relation: near
